<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYELIN</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #08080c;
    color: #f0f0f0;
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 100;
  }

  #hud-left {
    position: absolute;
    top: 18px;
    left: 22px;
  }

  #avg-display {
    font-size: 0.85rem;
    color: #666;
    letter-spacing: 0.08em;
    font-weight: 500;
  }

  #hud-center {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: all;
  }

  #sound-toggle {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  #sound-toggle input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border: 1.5px solid #444;
    border-radius: 2px;
    background: transparent;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    margin: 0;
  }

  #sound-toggle input[type="checkbox"]:checked {
    background: #333;
    border-color: #555;
  }

  #sound-toggle input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 2px;
    top: 0px;
    width: 5px;
    height: 8px;
    border: 1.5px solid #666;
    border-top: none;
    border-left: none;
    transform: rotate(45deg);
  }

  #sound-label {
    font-size: 0.72rem;
    color: #444;
    letter-spacing: 0.05em;
  }

  #hud-right {
    position: absolute;
    top: 14px;
    right: 22px;
    text-align: right;
  }

  #score-display {
    font-size: clamp(1rem, 2.2vw, 1.6rem);
    color: #00e5ff;
    font-weight: 600;
    letter-spacing: 0.04em;
    line-height: 1;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    min-width: 8ch;
  }

  #lives-display {
    margin-top: 6px;
    display: flex;
    justify-content: flex-end;
    gap: 6px;
  }

  .life-pip {
    font-size: 0.85rem;
    color: #00e5ff;
    transition: color 0.1s;
  }

  .life-pip.lost {
    color: #333;
  }

  .life-pip.flash-red {
    color: #ff2244;
  }

  /* Flash overlay */
  #flash-overlay {
    position: absolute;
    inset: 0;
    background: rgba(255, 34, 68, 0.12);
    pointer-events: none;
    opacity: 0;
    z-index: 200;
  }

  #flash-overlay.active {
    opacity: 1;
  }

  /* Letter elements */
  .letter-el {
    position: absolute;
    font-size: clamp(3rem, 6vw, 5rem);
    font-weight: 700;
    color: #f0f0f0;
    text-transform: uppercase;
    cursor: default;
    transform-origin: center;
    pointer-events: none;
    animation: letterAppear 150ms cubic-bezier(0.0, 0.0, 0.2, 1) forwards;
    text-shadow: 0 0 20px rgba(255,255,255,0.15);
    line-height: 1;
  }

  .letter-el.dim {
    opacity: 0.35;
  }

  .letter-el.activating {
    transition: opacity 100ms ease;
    opacity: 1;
  }

  @keyframes letterAppear {
    from { transform: scale(3); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  @keyframes glowFade {
    from { text-shadow: 0 0 20px rgba(255,255,255,0.15); }
    to   { text-shadow: 0 0 0px rgba(255,255,255,0); }
  }

  .letter-el.glow-fade {
    animation: glowFade 300ms ease forwards;
  }

  @keyframes correctHit {
    0%   { transform: scale(1); opacity: 1; color: #00e5ff; text-shadow: 0 0 20px rgba(0,229,255,0.5); }
    30%  { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(1.3); opacity: 0; }
  }

  .letter-el.correct-anim {
    animation: correctHit 180ms ease forwards !important;
    color: #00e5ff;
    pointer-events: none;
  }

  @keyframes shakeLetter {
    0%   { transform: translateX(0); }
    15%  { transform: translateX(-6px); }
    30%  { transform: translateX(6px); }
    45%  { transform: translateX(-6px); }
    60%  { transform: translateX(6px); }
    75%  { transform: translateX(-6px); }
    90%  { transform: translateX(6px); }
    100% { transform: translateX(0); }
  }

  .letter-el.shake-anim {
    animation: shakeLetter 200ms ease-out forwards !important;
  }

  .letter-el.red {
    color: #ff2244;
    text-shadow: 0 0 24px rgba(255, 34, 68, 0.25);
  }

  /* Score popup */
  .score-popup {
    position: absolute;
    font-size: 0.95rem;
    font-weight: 700;
    color: #5dd6e0;
    pointer-events: none;
    white-space: nowrap;
    opacity: 1;
    z-index: 150;
    animation: scoreRise 600ms ease-out forwards;
  }

  @keyframes scoreRise {
    0%   { transform: translateY(0);    opacity: 1; }
    100% { transform: translateY(-55px); opacity: 0; }
  }

  /* Burst rings */
  .burst-ring {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0);
    z-index: 160;
  }

  @keyframes burstBig {
    0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(4.5); opacity: 0; }
  }

  @keyframes burstSmall {
    0%   { transform: translate(-50%, -50%) scale(0.2); opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
  }

  .burst-ring.big {
    width: 64px;
    height: 64px;
    border: 2.5px solid #00e5ff;
    animation: burstBig 420ms cubic-bezier(0.0, 0.5, 0.5, 1) forwards;
  }

  .burst-ring.small {
    width: 56px;
    height: 56px;
    border: 1.5px solid rgba(0, 229, 255, 0.55);
    animation: burstSmall 260ms ease-out forwards;
  }

  .burst-ring.baseline {
    width: 56px;
    height: 56px;
    border: 1.5px solid rgba(255, 255, 255, 0.45);
    animation: burstSmall 320ms ease-out forwards;
  }

  /* Screens */
  #screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }

  #screen.hidden { display: none; }

  /* Start screen */
  @keyframes reactPulse {
    0%, 100% { opacity: 0.7; }
    50%       { opacity: 1.0; }
  }

  #start-title {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 800;
    letter-spacing: 0.3em;
    color: #f0f0f0;
    animation: reactPulse 3s ease-in-out infinite;
  }

  @keyframes subtlePulse {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 0.65; }
  }

  #start-subtitle {
    margin-top: 24px;
    font-size: 0.95rem;
    color: #777;
    letter-spacing: 0.12em;
    animation: subtlePulse 3s ease-in-out infinite;
  }

  #start-highscore {
    margin-top: 16px;
    font-size: 0.78rem;
    color: #555;
    letter-spacing: 0.1em;
  }

  /* Announcement chars — outlined, distinct from gameplay letters */
  .ann-char {
    position: absolute;
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 800;
    color: transparent;
    -webkit-text-stroke: 2px rgba(140, 160, 170, 0.75);
    letter-spacing: 0.05em;
    pointer-events: none;
    transform-origin: center;
    animation: annAppear 200ms cubic-bezier(0.0, 0.0, 0.2, 1) forwards;
  }

  @keyframes annAppear {
    from { transform: scale(3); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .ann-char.fade-out {
    animation: annFadeOut 300ms ease forwards !important;
  }

  @keyframes annFadeOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  /* Game Over screen */
  #gameover-title {
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 800;
    color: #f0f0f0;
    letter-spacing: 0.15em;
    opacity: 0;
  }

  #gameover-title.show {
    opacity: 1;
  }

  @keyframes goFlicker {
    0%   { opacity: 1; }
    30%  { opacity: 0.3; }
    60%  { opacity: 1; }
    100% { opacity: 1; }
  }

  #gameover-title.flicker {
    animation: goFlicker 200ms ease forwards;
  }

  #gameover-stats {
    margin-top: 32px;
    text-align: center;
    opacity: 0;
    transition: opacity 400ms ease;
    line-height: 2;
  }

  #gameover-stats.show { opacity: 1; }

  #gameover-final-score {
    font-size: 2.8rem;
    font-weight: 700;
    color: #00e5ff;
    letter-spacing: 0.06em;
  }

  #gameover-details {
    font-size: 0.95rem;
    color: #888;
    letter-spacing: 0.08em;
  }

  /* High score entry */
  #highscore-section {
    margin-top: 28px;
    text-align: center;
  }

  #new-hs-label {
    font-size: 1.1rem;
    font-weight: 700;
    color: #00e5ff;
    letter-spacing: 0.12em;
    animation: hsPulse 1.5s ease-in-out infinite;
  }

  @keyframes hsPulse {
    0%, 100% { text-shadow: 0 0 6px rgba(0,229,255,0.3); }
    50%       { text-shadow: 0 0 18px rgba(0,229,255,0.8); }
  }

  #initials-entry {
    margin-top: 14px;
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: 0.5em;
    color: #f0f0f0;
    min-width: 3ch;
    text-align: center;
  }

  #initials-hint {
    margin-top: 8px;
    font-size: 0.8rem;
    color: #555;
    letter-spacing: 0.08em;
    min-height: 1.2em;
  }

  /* Leaderboard */
  #leaderboard {
    margin-top: 20px;
    font-size: 0.82rem;
    color: #555;
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.9;
  }

  .lb-row { display: flex; gap: 16px; justify-content: center; }
  .lb-row.current { color: #00e5ff; font-weight: 700; }
  .lb-rank { width: 20px; text-align: right; }
  .lb-init { width: 30px; text-align: center; }
  .lb-score { width: 100px; text-align: right; font-variant-numeric: tabular-nums; }

  #play-again-hint {
    margin-top: 20px;
    font-size: 0.8rem;
    color: #444;
    letter-spacing: 0.1em;
  }

  /* ── Bonus round ── */
  #bonus-overlay {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 90;
  }

  #bonus-timer-wrap {
    width: clamp(220px, 40vw, 320px);
    height: 5px;
    background: #111116;
    border-radius: 3px;
    overflow: hidden;
  }

  #bonus-timer-bar {
    height: 100%;
    width: 100%;
    background: #00e5ff;
    border-radius: 3px;
    transform-origin: left;
  }

  #bonus-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(6px, 1.2vw, 10px);
  }

  .bonus-cell {
    width: clamp(62px, 9vw, 88px);
    height: clamp(62px, 9vw, 88px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 700;
    color: #1e1e26;
    background: #0c0c10;
    border: 1px solid #1a1a22;
    border-radius: 5px;
    transition: color 70ms ease, background 70ms ease, border-color 70ms ease, box-shadow 70ms ease;
    will-change: transform;
  }

  .bonus-cell.lit {
    color: #f0f0f0;
    background: #0d1c22;
    border-color: #00e5ff;
    box-shadow: 0 0 18px rgba(0, 229, 255, 0.35), inset 0 0 8px rgba(0, 229, 255, 0.08);
  }

  .bonus-cell.hit {
    background: rgba(0, 229, 255, 0.18);
    border-color: #00e5ff;
    box-shadow: 0 0 28px rgba(0, 229, 255, 0.55);
  }

  @keyframes bonusVibrate {
    0%   { transform: translate(0,     0); }
    20%  { transform: translate(-2px,  1px); }
    40%  { transform: translate( 2px, -1px); }
    60%  { transform: translate(-1px,  2px); }
    80%  { transform: translate( 1px, -1px); }
    100% { transform: translate(0,     0); }
  }

  .bonus-cell.vibrating {
    animation: bonusVibrate 110ms ease-in-out infinite;
  }

  @keyframes bonusCellExplode {
    0%   { transform: scale(1) translate(0, 0); opacity: 1; }
    25%  { transform: scale(1.35) translate(0, 0); opacity: 1; }
    100% { transform: scale(0.4) translate(var(--ex, 0px), var(--ey, -80px)); opacity: 0; }
  }

  .bonus-cell.exploding {
    animation: bonusCellExplode 420ms ease-out forwards !important;
  }

  #bonus-score-label {
    font-size: 0.9rem;
    font-weight: 700;
    color: #00e5ff;
    letter-spacing: 0.12em;
    min-height: 1.2em;
  }

  #bonus-countdown {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(4rem, 12vw, 9rem);
    font-weight: 800;
    color: #f0f0f0;
    pointer-events: none;
    z-index: 95;
    letter-spacing: 0.05em;
  }

  @keyframes countPop {
    0%   { transform: translate(-50%, -50%) scale(1.8); opacity: 0; }
    40%  { transform: translate(-50%, -50%) scale(0.95); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  #bonus-countdown.pop {
    animation: countPop 250ms cubic-bezier(0, 0, 0.2, 1) forwards;
  }

  @keyframes countFade {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  #bonus-countdown.fade {
    animation: countFade 180ms ease forwards;
  }

  /* Bonus bar */
  #bonus-bar-container {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    z-index: 100;
    pointer-events: none;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  #bonus-bar {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .bonus-chunk {
    width: 14px;
    height: 5px;
    background: #111116;
    border: 1px solid #222228;
    border-radius: 1px;
    transition: background 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
  }

  .bonus-chunk.filled {
    background: #00e5ff;
    border-color: #00e5ff;
    box-shadow: 0 0 4px rgba(0, 229, 255, 0.4);
  }

  @keyframes bonusFill {
    0%   { opacity: 1; transform: translateX(-50%) scaleX(1); }
    40%  { opacity: 1; transform: translateX(-50%) scaleX(1.04); }
    100% { opacity: 0; transform: translateX(-50%) scaleX(1); }
  }

  #bonus-bar-container.flash {
    animation: bonusFill 600ms ease forwards;
  }
</style>
</head>
<body>
<div id="game-container">
  <div id="hud">
    <div id="hud-left">
      <div id="avg-display">AVG ---</div>
    </div>
    <div id="hud-center">
      <label id="sound-toggle" title="Toggle sound">
        <input type="checkbox" id="sound-checkbox" checked>
        <span id="sound-label">♪</span>
      </label>
    </div>
    <div id="hud-right">
      <div id="score-display">0</div>
      <div id="lives-display"></div>
    </div>
  </div>

  <div id="flash-overlay"></div>

  <!-- Letters are injected here dynamically -->
  <div id="letters-layer" style="position:absolute;inset:0;pointer-events:none;"></div>

  <!-- Announcement chars layer -->
  <div id="ann-layer" style="position:absolute;inset:0;pointer-events:none;"></div>

  <!-- Bonus round overlay -->
  <div id="bonus-overlay">
    <div id="bonus-timer-wrap"><div id="bonus-timer-bar"></div></div>
    <div id="bonus-grid"></div>
    <div id="bonus-score-label"></div>
    <div id="bonus-countdown"></div>
  </div>

  <!-- Bonus bar -->
  <div id="bonus-bar-container">
    <div id="bonus-bar"></div>
  </div>

  <!-- Main screen (start / game over) -->
  <div id="screen">
    <!-- Start -->
    <div id="start-screen">
      <div id="start-title">MYELIN</div>
      <div id="start-subtitle">Press any key to begin</div>
      <div id="start-highscore"></div>
    </div>

    <!-- Game Over -->
    <div id="gameover-screen" style="display:none;text-align:center;">
      <div id="gameover-title">GAME OVER</div>
      <div id="gameover-stats">
        <div id="gameover-final-score"></div>
        <div id="gameover-details"></div>
      </div>
      <div id="highscore-section" style="display:none;">
        <div id="new-hs-label">NEW HIGH SCORE!</div>
        <div id="initials-entry">_ _ _</div>
        <div id="initials-hint"></div>
      </div>
      <div id="leaderboard"></div>
      <div id="play-again-hint" style="display:none;">Press any key to play again</div>
    </div>
  </div>
</div>

<script>
'use strict';

// ─── Constants ────────────────────────────────────────────────────────────────
const GROUPS_PER_ROUND = 7;
const TOTAL_LIVES = 3;
const GAP_START = 2500;
const GAP_MIN = 300;
const GAP_STEP = 200;
const STAGGER_MS = 300;
const ANN_CHAR_STAGGER = 250;
const ANN_HOLD = 1500;
const ANN_FADE = 300;
const SCORE_POPUP_DURATION = 700;
const HUD_TOP_PAD = 70;
const EDGE_PAD = 60;
const BONUS_BAR_MAX = 24;
const ROUNDS_PER_CYCLE = 7;
const BURST_THRESHOLD_MS = 30; // within this many ms of best = small burst

// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  phase: 'start',      // 'start' | 'announcing' | 'playing' | 'gameover' | 'entering_initials'
  round: 1,
  groupIndex: 0,
  score: 0,
  lives: TOTAL_LIVES,
  reactionTimes: [],   // all ms per correct hit
  totalLetters: 0,
  bestMs: Infinity,

  // current group
  currentGroup: [],    // array of { letter, el, appearTime }
  nextExpected: 0,     // index into currentGroup
  wrongPressedThisGroup: false,
  groupFailed: false,  // group was failed (0 lives while processing)
  pendingGameOver: false,

  // timing
  gapDelay: GAP_START,
  groupTimeout: null,

  // bonus bar
  bonusChunks: 0,

  // bonus round
  bonusActive: false,
  bonusGrid: [],
  bonusLitIndex: -1,
  bonusLitAppearTime: 0,
  bonusScore: 0,
  bonusTimerStart: 0,
  bonusTimerAnimId: null,
  bonusLitTimeout: null,
  bonusScheduleTimeout: null,
  bonusCallback: null,

  // score animation
  displayedScore: 0,
  scoreAnimId: null,

  // audio
  audioCtx: null,
  soundEnabled: true,

  // initials entry
  enteredInitials: [],
  playerRank: -1,
};

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const $container = document.getElementById('game-container');
const $lettersLayer = document.getElementById('letters-layer');
const $annLayer = document.getElementById('ann-layer');
const $screen = document.getElementById('screen');
const $startScreen = document.getElementById('start-screen');
const $gameoverScreen = document.getElementById('gameover-screen');
const $scoreDisplay = document.getElementById('score-display');
const $avgDisplay = document.getElementById('avg-display');
const $livesDisplay = document.getElementById('lives-display');
const $flashOverlay = document.getElementById('flash-overlay');
const $startHighscore = document.getElementById('start-highscore');
const $gameoverTitle = document.getElementById('gameover-title');
const $gameoverStats = document.getElementById('gameover-stats');
const $gameoverFinalScore = document.getElementById('gameover-final-score');
const $gameoverDetails = document.getElementById('gameover-details');
const $highscoreSection = document.getElementById('highscore-section');
const $initialsEntry = document.getElementById('initials-entry');
const $initialsHint = document.getElementById('initials-hint');
const $leaderboard = document.getElementById('leaderboard');
const $playAgainHint = document.getElementById('play-again-hint');

// ─── Cycle / round helpers ────────────────────────────────────────────────────
function getCycle() {
  return Math.floor((state.round - 1) / ROUNDS_PER_CYCLE);
}

function getGroupSize() {
  return ((state.round - 1) % ROUNDS_PER_CYCLE) + 1;
}

function getCycleGapStart() {
  return Math.round(GAP_START * Math.pow(0.9, getCycle()));
}

function getCycleGapStep() {
  return Math.round(GAP_STEP * Math.pow(0.9, getCycle()));
}

function redLettersActive() {
  return getCycle() >= 1; // from set 2 (round 8) onwards
}

// ─── Audio ────────────────────────────────────────────────────────────────────
function initAudio() {
  if (state.audioCtx) return;
  try {
    state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) { state.audioCtx = null; }
}

function playTone({ freq = 440, endFreq = null, duration = 100, type = 'sine', gain = 0.1, startDelay = 0 } = {}) {
  if (!state.audioCtx || !state.soundEnabled) return;
  try {
    const ctx = state.audioCtx;
    const osc = ctx.createOscillator();
    const gainNode = ctx.createGain();
    osc.connect(gainNode);
    gainNode.connect(ctx.destination);
    osc.type = type;
    const t = ctx.currentTime + startDelay;
    osc.frequency.setValueAtTime(freq, t);
    if (endFreq !== null) {
      osc.frequency.linearRampToValueAtTime(endFreq, t + duration / 1000);
    }
    gainNode.gain.setValueAtTime(gain, t);
    gainNode.gain.exponentialRampToValueAtTime(0.001, t + duration / 1000);
    osc.start(t);
    osc.stop(t + duration / 1000 + 0.01);
  } catch(e) {}
}

// ─── localStorage Leaderboard ─────────────────────────────────────────────────
function loadLeaderboard() {
  try {
    return JSON.parse(localStorage.getItem('myelin_lb') || '[]');
  } catch(e) { return []; }
}

function saveLeaderboard(lb) {
  try {
    localStorage.setItem('myelin_lb', JSON.stringify(lb));
  } catch(e) {}
}

function getTopScore() {
  const lb = loadLeaderboard();
  return lb.length ? lb[0].score : null;
}

function qualifiesForLeaderboard(score) {
  const lb = loadLeaderboard();
  if (lb.length < 10) return true;
  return score > lb[lb.length - 1].score;
}

function insertScore(initials, score, round) {
  const lb = loadLeaderboard();
  const entry = { initials: initials.toUpperCase(), score, round, date: new Date().toISOString().slice(0,10) };
  lb.push(entry);
  lb.sort((a, b) => b.score - a.score);
  const top10 = lb.slice(0, 10);
  saveLeaderboard(top10);
  return top10.findIndex(e => e === entry || (e.initials === entry.initials && e.score === entry.score && e.date === entry.date));
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function formatScore(n) {
  return Math.round(n).toLocaleString();
}

function animateScoreTo(target) {
  if (state.scoreAnimId) cancelAnimationFrame(state.scoreAnimId);
  const start = state.displayedScore;
  const delta = target - start;
  if (delta <= 0) {
    state.displayedScore = target;
    $scoreDisplay.textContent = formatScore(target);
    return;
  }
  const duration = Math.min(350, Math.max(120, delta / 500));
  const startTime = performance.now();
  function tick(now) {
    const t = Math.min(1, (now - startTime) / duration);
    const eased = 1 - Math.pow(1 - t, 2); // ease-out quad
    state.displayedScore = start + delta * eased;
    $scoreDisplay.textContent = formatScore(state.displayedScore);
    if (t < 1) {
      state.scoreAnimId = requestAnimationFrame(tick);
    } else {
      state.displayedScore = target;
      $scoreDisplay.textContent = formatScore(target);
      state.scoreAnimId = null;
    }
  }
  state.scoreAnimId = requestAnimationFrame(tick);
}

function renderHUD() {
  animateScoreTo(state.score);

  // lives — show at least TOTAL_LIVES slots; extra earned lives expand the row
  $livesDisplay.innerHTML = '';
  const totalPips = Math.max(TOTAL_LIVES, state.lives);
  for (let i = 0; i < totalPips; i++) {
    const pip = document.createElement('span');
    pip.className = 'life-pip' + (i >= state.lives ? ' lost' : '');
    pip.id = `pip-${i}`;
    pip.textContent = i < state.lives ? '●' : '○';
    $livesDisplay.appendChild(pip);
  }

  // avg
  if (state.reactionTimes.length === 0) {
    $avgDisplay.textContent = 'AVG ---';
  } else {
    const avg = Math.round(state.reactionTimes.reduce((a,b)=>a+b,0) / state.reactionTimes.length);
    $avgDisplay.textContent = `AVG ${avg}ms`;
  }
}

function flashLifePip(index) {
  const pip = document.getElementById(`pip-${TOTAL_LIVES - 1 - index}`);
  // Actually pip 0 is leftmost. The lost life is the one that just turned lost.
  // We want to flash the pip that just got lost, which is now index = state.lives (after decrement)
  const lostPip = document.getElementById(`pip-${state.lives}`);
  if (!lostPip) return;
  lostPip.classList.add('flash-red');
  setTimeout(() => lostPip.classList.remove('flash-red'), 300);
}

// ─── Letter position ──────────────────────────────────────────────────────────
function getLetterSize() {
  // approximate rendered em in px
  const tmp = document.createElement('span');
  tmp.style.cssText = `position:absolute;visibility:hidden;font-size:clamp(3rem,6vw,5rem);font-weight:700;font-family:Inter,'Helvetica Neue',Helvetica,Arial,sans-serif;`;
  tmp.textContent = 'A';
  document.body.appendChild(tmp);
  const rect = tmp.getBoundingClientRect();
  document.body.removeChild(tmp);
  return { w: rect.width, h: rect.height };
}

let cachedLetterSize = null;
function letterSize() {
  if (!cachedLetterSize) cachedLetterSize = getLetterSize();
  return cachedLetterSize;
}

function randomPos(existingPositions) {
  const { w, h } = letterSize();
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const minX = EDGE_PAD;
  const maxX = vw - EDGE_PAD - w;
  const minY = HUD_TOP_PAD + EDGE_PAD;
  const maxY = vh - EDGE_PAD - h;

  const maxAttempts = 50;
  for (let attempt = 0; attempt < maxAttempts; attempt++) {
    const x = minX + Math.random() * (maxX - minX);
    const y = minY + Math.random() * (maxY - minY);

    // check overlap with existing
    let ok = true;
    for (const pos of existingPositions) {
      const dx = Math.abs(pos.x - x);
      const dy = Math.abs(pos.y - y);
      if (dx < w + 20 && dy < h + 10) { ok = false; break; }
    }
    if (ok) return { x, y };
  }
  // fallback
  const x = minX + Math.random() * (maxX - minX);
  const y = minY + Math.random() * (maxY - minY);
  return { x, y };
}

// ─── Alphabet helpers ─────────────────────────────────────────────────────────
const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

function randomLetter(exclude = []) {
  const pool = ALPHABET.filter(l => !exclude.includes(l));
  return pool[Math.floor(Math.random() * pool.length)];
}

function buildGroup(size, excludeFirst = null) {
  const letters = [];
  for (let i = 0; i < size; i++) {
    const exc = [...letters, ...(i === 0 && excludeFirst ? [excludeFirst] : [])];
    letters.push(randomLetter(exc));
  }
  return letters;
}

// ─── Burst effect ─────────────────────────────────────────────────────────────
function showBurst(cx, cy, type) {
  const configs = {
    big:      { rings: 3, delays: [0, 65, 130], dur: 420 },
    small:    { rings: 1, delays: [0],           dur: 260 },
    baseline: { rings: 2, delays: [0, 80],       dur: 320 },
  };
  const cfg = configs[type];
  for (let i = 0; i < cfg.rings; i++) {
    const ring = document.createElement('div');
    ring.className = `burst-ring ${type}`;
    ring.style.left = `${cx}px`;
    ring.style.top  = `${cy}px`;
    if (cfg.delays[i]) ring.style.animationDelay = `${cfg.delays[i]}ms`;
    $container.appendChild(ring);
    setTimeout(() => { if (ring.parentNode) ring.parentNode.removeChild(ring); },
      cfg.dur + cfg.delays[i] + 60);
  }
}

function showScorePopup(x, y, points) {
  const el = document.createElement('div');
  el.className = 'score-popup';

  el.style.left = `${x}px`;

// ─── Clear layers ─────────────────────────────────────────────────────────────
function clearLetters() {
  $lettersLayer.innerHTML = '';
  state.currentGroup = [];
  state.nextExpected = 0;
}

function clearAnn() {
  $annLayer.innerHTML = '';
}

// ─── Game flow ────────────────────────────────────────────────────────────────
function showStartScreen() {
  state.phase = 'start';
  $screen.classList.remove('hidden');
  $startScreen.style.display = '';
  $gameoverScreen.style.display = 'none';
  $lettersLayer.innerHTML = '';
  $annLayer.innerHTML = '';

  const top = getTopScore();
  $startHighscore.textContent = top !== null ? `HIGH SCORE: ${formatScore(top)}` : '';
}

function startGame() {
  if (state.scoreAnimId) { cancelAnimationFrame(state.scoreAnimId); state.scoreAnimId = null; }
  state.round = 1;
  state.groupIndex = 0;
  state.score = 0;
  state.displayedScore = 0;
  state.lives = TOTAL_LIVES;
  state.reactionTimes = [];
  state.totalLetters = 0;
  state.bestMs = Infinity;
  state.gapDelay = GAP_START;
  state.pendingGameOver = false;
  state.lastLetter = null;
  state.bonusChunks = 0;
  state.bonusActive = false;
  clearTimeout(state.bonusLitTimeout);
  clearTimeout(state.bonusScheduleTimeout);
  if (state.bonusTimerAnimId) cancelAnimationFrame(state.bonusTimerAnimId);
  document.getElementById('bonus-overlay').style.display = 'none';

  $screen.classList.add('hidden');
  $startScreen.style.display = 'none';
  $gameoverScreen.style.display = 'none';
  clearLetters();
  clearAnn();
  renderHUD();
  updateBonusBar();

  announceRound(state.round, () => beginRound());
}

function beginRound() {
  state.groupIndex = 0;
  state.gapDelay = getCycleGapStart();
  state.phase = 'playing';
  clearLetters();
  updateBonusBar();
  scheduleNextGroup();
}

function scheduleNextGroup() {
  if (state.phase !== 'playing') return;
  state.groupTimeout = setTimeout(() => showGroup(), state.gapDelay);
}

function showGroup() {
  if (state.phase !== 'playing') return;

  clearLetters();
  state.wrongPressedThisGroup = false;
  state.groupFailed = false;

  const groupSize = getGroupSize();
  const excludeFirst = state.lastLetter || null;
  const letters = buildGroup(groupSize, excludeFirst);

  // positions
  const positions = [];
  const posList = [];
  for (let i = 0; i < groupSize; i++) {
    const pos = randomPos(posList);
    posList.push(pos);
    positions.push(pos);
  }

  // assign red letters (10% chance each, only from round 4+)
  const redActive = redLettersActive();
  state.currentGroup = letters.map((letter, i) => ({
    letter,
    el: null,
    appearTime: null,
    pos: positions[i],
    hit: false,
    isRed: redActive && Math.random() < 0.1,
  }));
  state.nextExpected = 0;

  const isSingleLetter = groupSize === 1;

  function showLetterAt(index) {
    const item = state.currentGroup[index];
    const el = document.createElement('div');
    const classes = ['letter-el'];
    if (index > 0) classes.push('dim');
    if (item.isRed) classes.push('red');
    el.className = classes.join(' ');
    el.textContent = item.letter;
    el.style.left = `${item.pos.x}px`;
    el.style.top = `${item.pos.y}px`;
    $lettersLayer.appendChild(el);
    item.el = el;
    item.appearTime = performance.now();
    sfxAppear();

    // glow fade after appear
    setTimeout(() => {
      if (el.parentNode) {
        el.classList.remove('glow-fade');
        void el.offsetWidth;
        el.classList.add('glow-fade');
      }
    }, 150);
  }

  if (isSingleLetter) {
    showLetterAt(0);
  } else {
    // stagger
    for (let i = 0; i < groupSize; i++) {
      setTimeout(() => showLetterAt(i), i * STAGGER_MS);
    }
  }
}

function activateNextLetter() {
  const idx = state.nextExpected;
  if (idx >= state.currentGroup.length) return;
  const item = state.currentGroup[idx];
  if (!item.el) return;
  item.el.classList.remove('dim');
  item.el.classList.add('activating');
  if (item.isRed) item.el.classList.add('red');
  item.appearTime = performance.now(); // reset reaction clock to when it became active
}

function onGroupComplete() {
  // track last letter for next group no-repeat rule
  if (state.currentGroup.length > 0) {
    state.lastLetter = state.currentGroup[state.currentGroup.length - 1].letter;
  }

  if (state.pendingGameOver) {
    triggerGameOver();
    return;
  }

  state.groupIndex++;
  // decrease gap
  state.gapDelay = Math.max(GAP_MIN, state.gapDelay - getCycleGapStep());

  if (state.groupIndex >= GROUPS_PER_ROUND) {
    // advance round
    const completedRound = state.round;
    state.round++;
    if (completedRound % 3 === 0) {
      enterBonusRound(() => announceRound(state.round, () => beginRound()));
    } else {
      announceRound(state.round, () => beginRound());
    }
  } else {
    scheduleNextGroup();
  }
}

// ─── Key handling ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', handleKey);

function handleKey(e) {
  const key = e.key;

  if (state.phase === 'start') {
    e.preventDefault();
    initAudio();
    startGame();
    return;
  }

  if (state.phase === 'playing') {
    if (!/^[a-zA-Z]$/.test(key)) return;
    e.preventDefault();
    const pressed = key.toUpperCase();
    handleGameKey(pressed);
    return;
  }

  if (state.phase === 'bonus') {
    if (!/^[a-zA-Z]$/.test(key)) return;
    e.preventDefault();
    handleBonusKey(key.toUpperCase());
    return;
  }

  if (state.phase === 'entering_initials') {
    if (/^[a-zA-Z]$/.test(key)) {
      e.preventDefault();
      handleInitialsKey(key.toUpperCase());
    } else if (key === 'Backspace') {
      e.preventDefault();
      handleInitialsBackspace();
    } else if (key === 'Enter') {
      e.preventDefault();
      handleInitialsEnter();
    }
    return;
  }

  if (state.phase === 'gameover') {
    e.preventDefault();
    initAudio();
    showStartScreen();
    return;
  }
}

function handleGameKey(letter) {
  const group = state.currentGroup;
  if (group.length === 0) return;

  const idx = state.nextExpected;
  if (idx >= group.length) return; // all hit

  // Check if the current expected letter's element has appeared yet
  const expectedItem = group[idx];
  if (!expectedItem.el) return; // letter hasn't appeared yet (stagger)

  // Also check: in staggered mode, if letter isn't fully visible yet (dim means not active target)
  // Actually by spec: "next expected letter: full opacity". Letters after that are dim.
  // The active target is idx.

  // For red letters: any key EXCEPT the letter's key is correct
  // For normal letters: the exact key is correct
  const isCorrect = expectedItem.isRed
    ? (letter !== expectedItem.letter)
    : (letter === expectedItem.letter);

  if (isCorrect) {
    const now = performance.now();
    const reactionMs = Math.round(now - expectedItem.appearTime);

    // Multiplied scoring: base × group size × set number
    const setNumber = getCycle() + 1;
    const groupSizeMult = getGroupSize();
    const basePoints = Math.max(10, Math.round(50000 / Math.max(reactionMs, 50)));
    const points = basePoints * groupSizeMult * setNumber;

    // Determine burst type before updating bestMs
    const isFirstHit = state.reactionTimes.length === 0;
    const previousBest = state.bestMs;
    let burstType = null;
    if (isFirstHit) {
      burstType = 'baseline';
    } else if (reactionMs < previousBest) {
      burstType = 'big';
    } else if (reactionMs <= previousBest + BURST_THRESHOLD_MS) {
      burstType = 'small';
    }

    state.score += points;
    state.reactionTimes.push(reactionMs);
    state.totalLetters++;
    if (reactionMs < state.bestMs) state.bestMs = reactionMs;

    // if red letter was correctly avoided, add bonus chunk
    if (expectedItem.isRed) {
      addBonusChunk();
    }

    // animate letter
    const el = expectedItem.el;
    el.classList.remove('dim', 'activating', 'glow-fade', 'red');
    el.classList.add('correct-anim');
    sfxCorrect();

    // burst effect
    if (burstType) {
      const { w, h } = letterSize();
      showBurst(expectedItem.pos.x + w / 2, expectedItem.pos.y + h / 2, burstType);
    }

    // score popup
    const { w, h } = letterSize();
    showScorePopup(expectedItem.pos.x + w / 2 - 20, expectedItem.pos.y - 5, points);

    setTimeout(() => {
      if (el.parentNode) el.parentNode.removeChild(el);
    }, 180);

    state.nextExpected++;
    renderHUD();

    // activate next if exists
    if (state.nextExpected < group.length) {
      activateNextLetter();
    } else {
      // group complete
      setTimeout(() => onGroupComplete(), 100);
    }

  } else {
    // Wrong key
    if (!state.wrongPressedThisGroup) {
      state.wrongPressedThisGroup = true;
      sfxWrong();
      sfxLifeLost();
      flashRed();

      state.lives--;
      renderHUD();
      flashLifePip();

      // shake the expected letter
      const el = expectedItem.el;
      el.classList.remove('shake-anim');
      void el.offsetWidth;
      el.classList.add('shake-anim');
      setTimeout(() => el.classList.remove('shake-anim'), 200);

      if (state.lives <= 0) {
        state.pendingGameOver = true;
      }
    }
    // subsequent wrong presses: no effect
  }
}

// ─── Bonus Bar ────────────────────────────────────────────────────────────────
const $bonusBarContainer = document.getElementById('bonus-bar-container');
const $bonusBar = document.getElementById('bonus-bar');

// Build chunks once
(function initBonusBar() {
  for (let i = 0; i < BONUS_BAR_MAX; i++) {
    const chunk = document.createElement('div');
    chunk.className = 'bonus-chunk';
    $bonusBar.appendChild(chunk);
  }
})();

function updateBonusBar() {
  const visible = getCycle() >= 1;
  $bonusBarContainer.style.display = visible ? 'flex' : 'none';
  if (!visible) return;
  const chunks = $bonusBar.querySelectorAll('.bonus-chunk');
  chunks.forEach((chunk, i) => {
    chunk.classList.toggle('filled', i < state.bonusChunks);
  });
}

function addBonusChunk() {
  state.bonusChunks++;
  if (state.bonusChunks >= BONUS_BAR_MAX) {
    state.bonusChunks = 0;
    state.lives++;
    renderHUD();
    updateBonusBar();
    // brief flash on the bar container
    $bonusBarContainer.classList.remove('flash');
    void $bonusBarContainer.offsetWidth;
    $bonusBarContainer.classList.add('flash');
    setTimeout(() => $bonusBarContainer.classList.remove('flash'), 600);
  } else {
    updateBonusBar();
  }
}

// ─── Bonus Round ──────────────────────────────────────────────────────────────
const BONUS_DURATION     = 20000;
const BONUS_LIT_START    = 950;   // ms letter stays lit at beginning
const BONUS_LIT_END      = 380;   // ms at end of round
const BONUS_GAP_START    = 320;   // ms between lit-ups at beginning
const BONUS_GAP_END      = 100;   // ms between lit-ups at end

const $bonusOverlay   = document.getElementById('bonus-overlay');
const $bonusTimerBar  = document.getElementById('bonus-timer-bar');
const $bonusGrid      = document.getElementById('bonus-grid');
const $bonusScoreLabel = document.getElementById('bonus-score-label');
const $bonusCountdown  = document.getElementById('bonus-countdown');

function bonusLitDuration() {
  const p = Math.min(1, (performance.now() - state.bonusTimerStart) / BONUS_DURATION);
  return Math.round(BONUS_LIT_START + (BONUS_LIT_END - BONUS_LIT_START) * p);
}
function bonusGapDuration() {
  const p = Math.min(1, (performance.now() - state.bonusTimerStart) / BONUS_DURATION);
  return Math.round(BONUS_GAP_START + (BONUS_GAP_END - BONUS_GAP_START) * p);
}

function enterBonusRound(callback) {
  state.phase = 'bonus';
  state.bonusActive = false;
  state.bonusGrid = [];
  state.bonusLitIndex = -1;
  state.bonusScore = 0;
  state.bonusCallback = callback;

  // 9 unique letters
  const pool = [...ALPHABET];
  const letters = [];
  for (let i = 0; i < 9; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    letters.push(pool.splice(idx, 1)[0]);
  }

  $bonusGrid.innerHTML = '';
  letters.forEach(letter => {
    const cell = document.createElement('div');
    cell.className = 'bonus-cell';
    cell.textContent = letter;
    $bonusGrid.appendChild(cell);
    state.bonusGrid.push({ letter, el: cell });
  });

  $bonusTimerBar.style.width = '100%';
  $bonusTimerBar.style.background = '#00e5ff';
  $bonusScoreLabel.textContent = '';
  $bonusCountdown.className = '';
  $bonusCountdown.textContent = '';

  // Grid hidden during countdown; timer hidden until GO
  $bonusGrid.style.visibility = 'hidden';
  $bonusTimerBar.parentElement.style.visibility = 'hidden';
  $bonusScoreLabel.style.visibility = 'hidden';

  $bonusOverlay.style.display = 'flex';

  // Run countdown 3 → 2 → 1 → GO
  const steps = [
    { text: '3', sound: sfxBonusCountdown },
    { text: '2', sound: sfxBonusCountdown },
    { text: '1', sound: sfxBonusCountdown },
    { text: 'GO', sound: sfxBonusGo },
  ];
  let si = 0;
  function showStep() {
    if (si >= steps.length) {
      // Start round
      $bonusCountdown.className = 'fade';
      setTimeout(() => { $bonusCountdown.textContent = ''; }, 180);
      $bonusGrid.style.visibility = '';
      $bonusTimerBar.parentElement.style.visibility = '';
      $bonusScoreLabel.style.visibility = '';
      $bonusScoreLabel.textContent = 'BONUS';
      startBonusTimer();
      scheduleBonusLit();
      return;
    }
    const step = steps[si++];
    step.sound();
    $bonusCountdown.className = '';
    void $bonusCountdown.offsetWidth;
    $bonusCountdown.textContent = step.text;
    $bonusCountdown.className = 'pop';
    setTimeout(showStep, 750);
  }
  setTimeout(showStep, 600); // brief blank before countdown starts
}

function startBonusTimer() {
  state.bonusTimerStart = performance.now();
  state.bonusActive = true;
  tickBonusTimer();
}

function tickBonusTimer() {
  if (!state.bonusActive) return;
  const elapsed = performance.now() - state.bonusTimerStart;
  const remaining = Math.max(0, BONUS_DURATION - elapsed);
  const frac = remaining / BONUS_DURATION;

  $bonusTimerBar.style.width = `${frac * 100}%`;
  if (frac > 0.4)       $bonusTimerBar.style.background = '#00e5ff';
  else if (frac > 0.15) $bonusTimerBar.style.background = '#ffcc00';
  else                  $bonusTimerBar.style.background = '#ff2244';

  // Last 3 seconds: vibrate cells
  if (remaining <= 3000) {
    state.bonusGrid.forEach(item => item.el.classList.add('vibrating'));
  }

  if (remaining <= 0) {
    endBonusRound();
    return;
  }
  state.bonusTimerAnimId = requestAnimationFrame(() => tickBonusTimer());
}

function scheduleBonusLit() {
  if (!state.bonusActive) return;
  state.bonusScheduleTimeout = setTimeout(() => {
    if (!state.bonusActive) return;
    lightUpBonusCell();
  }, bonusGapDuration());
}

function lightUpBonusCell() {
  if (!state.bonusActive) return;
  // Pick a random cell, avoid repeating the last one
  const available = state.bonusGrid.map((_, i) => i).filter(i => i !== state.bonusLitIndex);
  const idx = available[Math.floor(Math.random() * available.length)];
  state.bonusLitIndex = idx;
  state.bonusLitAppearTime = performance.now();

  const item = state.bonusGrid[idx];
  item.el.classList.add('lit');
  sfxAppear();

  const dur = bonusLitDuration();
  state.bonusLitTimeout = setTimeout(() => {
    if (!state.bonusActive) return;
    item.el.classList.remove('lit');
    state.bonusLitIndex = -1;
    scheduleBonusLit();
  }, dur);
}

function handleBonusKey(letter) {
  if (!state.bonusActive || state.bonusLitIndex < 0) return;
  const litItem = state.bonusGrid[state.bonusLitIndex];
  if (letter !== litItem.letter) return; // wrong key — no penalty

  const reactionMs = Math.round(performance.now() - state.bonusLitAppearTime);
  const pts = Math.max(50, Math.round(2000 / Math.max(reactionMs, 40)));
  state.bonusScore += pts;
  $bonusScoreLabel.textContent = `BONUS +${formatScore(state.bonusScore)}`;

  sfxCorrect();
  clearTimeout(state.bonusLitTimeout);

  // Brief hit flash then clear
  litItem.el.classList.remove('lit');
  litItem.el.classList.add('hit');
  setTimeout(() => litItem.el.classList.remove('hit'), 130);
  state.bonusLitIndex = -1;

  // Score popup near cell
  const rect = litItem.el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2 - $container.getBoundingClientRect().left;
  const cy = rect.top + rect.height / 2 - $container.getBoundingClientRect().top;
  showScorePopup(cx - 20, cy - 10, pts);

  scheduleBonusLit();
}

function endBonusRound() {
  state.bonusActive = false;
  if (state.bonusTimerAnimId) { cancelAnimationFrame(state.bonusTimerAnimId); state.bonusTimerAnimId = null; }
  clearTimeout(state.bonusLitTimeout);
  clearTimeout(state.bonusScheduleTimeout);

  // Clear any lit/vibrating state
  state.bonusGrid.forEach(item => item.el.classList.remove('lit', 'vibrating'));

  sfxBonusExplode();

  // Explode each cell with a random direction
  state.bonusGrid.forEach((item, i) => {
    const angle = (Math.random() * Math.PI * 2);
    const dist  = 80 + Math.random() * 120;
    item.el.style.setProperty('--ex', `${Math.round(Math.cos(angle) * dist)}px`);
    item.el.style.setProperty('--ey', `${Math.round(Math.sin(angle) * dist - 60)}px`);
    setTimeout(() => item.el.classList.add('exploding'), i * 35);
  });

  // Add bonus score to total and animate counter
  state.score += state.bonusScore;
  animateScoreTo(state.score);

  // Hide overlay then continue
  setTimeout(() => {
    $bonusOverlay.style.display = 'none';
    state.bonusCallback();
  }, 9 * 35 + 520);
}

// ─── Round Announcement ───────────────────────────────────────────────────────
function announceRound(roundNum, callback) {
  state.phase = 'announcing';
  clearAnn();

  const text = `ROUND ${roundNum}`;
  const chars = text.split('');

  setTimeout(() => {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const charSize = Math.max(40, Math.min(80, vw * 0.06));
    const pad = 40;
    const minX = pad;
    const maxX = vw - pad - charSize * 0.6;
    const minY = HUD_TOP_PAD + pad;
    const maxY = vh - pad - charSize;

    const spawnedEls = [];
    let charIdx = 0;
    const nonSpaceChars = chars.filter(c => c !== ' ');
    let spawnCount = 0;

    function spawnNext() {
      if (charIdx >= chars.length) {
        // All spawned, hold then fade out
        setTimeout(() => {
          spawnedEls.forEach(el => el.classList.add('fade-out'));
          setTimeout(() => {
            clearAnn();
            setTimeout(callback, 1000);
          }, ANN_FADE + 50);
        }, ANN_HOLD);
        return;
      }

      const ch = chars[charIdx];
      charIdx++;

      if (ch === ' ') {
        setTimeout(spawnNext, 0);
        return;
      }

      const x = minX + Math.random() * (maxX - minX);
      const y = minY + Math.random() * (maxY - minY);

      const el = document.createElement('div');
      el.className = 'ann-char';
      el.textContent = ch;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      $annLayer.appendChild(el);
      spawnedEls.push(el);
      sfxAnnChar();

      spawnCount++;
      setTimeout(spawnNext, ANN_CHAR_STAGGER);
    }

    spawnNext();

  }, 1000); // 1 second blank before announcement
}

// ─── Game Over ────────────────────────────────────────────────────────────────
function triggerGameOver() {
  state.phase = 'gameover';
  clearLetters();
  clearAnn();
  sfxGameOver();

  // save high score if applicable
  const qualifies = qualifiesForLeaderboard(state.score);

  $screen.classList.remove('hidden');
  $startScreen.style.display = 'none';
  $gameoverScreen.style.display = '';
  $gameoverTitle.className = '';
  $gameoverTitle.style.opacity = '0';
  $gameoverStats.classList.remove('show');
  $highscoreSection.style.display = 'none';
  $leaderboard.innerHTML = '';
  $playAgainHint.style.display = 'none';

  setTimeout(() => {
    // Show "GAME OVER"
    $gameoverTitle.style.opacity = '1';
    $gameoverTitle.classList.add('show');

    // Flicker
    setTimeout(() => {
      $gameoverTitle.classList.add('flicker');
    }, 50);

    // Stats
    setTimeout(() => {
      const avgMs = state.reactionTimes.length
        ? Math.round(state.reactionTimes.reduce((a,b)=>a+b,0)/state.reactionTimes.length)
        : 0;
      const bestMs = state.bestMs === Infinity ? 0 : state.bestMs;

      $gameoverFinalScore.textContent = formatScore(state.score);
      $gameoverDetails.innerHTML =
        `Reached Round ${state.round}<br>` +
        `Avg ${avgMs}ms &nbsp;·&nbsp; Best ${bestMs}ms<br>` +
        `${state.totalLetters} letters`;

      $gameoverStats.classList.add('show');

      if (qualifies && state.score > 0) {
        setTimeout(() => showInitialsEntry(), 600);
      } else {
        showLeaderboard(-1);
        setTimeout(() => {
          $playAgainHint.style.display = '';
          state.phase = 'gameover';
        }, 400);
      }
    }, 500 + 50);
  }, 500);
}

// ─── Initials Entry ───────────────────────────────────────────────────────────
function showInitialsEntry() {
  state.phase = 'entering_initials';
  state.enteredInitials = [];
  $highscoreSection.style.display = '';
  updateInitialsDisplay();
}

function updateInitialsDisplay() {
  const chars = state.enteredInitials;
  const display = [];
  for (let i = 0; i < 3; i++) {
    display.push(chars[i] || '_');
  }
  $initialsEntry.textContent = display.join(' ');

  if (chars.length === 3) {
    $initialsHint.textContent = 'Press Enter to confirm';
  } else {
    $initialsHint.textContent = '';
  }
}

function handleInitialsKey(letter) {
  if (state.enteredInitials.length < 3) {
    state.enteredInitials.push(letter);
    updateInitialsDisplay();
  }
}

function handleInitialsBackspace() {
  if (state.enteredInitials.length > 0) {
    state.enteredInitials.pop();
    updateInitialsDisplay();
  }
}

function handleInitialsEnter() {
  if (state.enteredInitials.length !== 3) return;
  const initials = state.enteredInitials.join('');
  const rank = insertScore(initials, state.score, state.round);
  state.playerRank = rank;
  $highscoreSection.style.display = 'none';
  showLeaderboard(rank);
  $playAgainHint.style.display = '';
  state.phase = 'gameover';
}

function showLeaderboard(highlightRank) {
  const lb = loadLeaderboard();
  $leaderboard.innerHTML = '';
  lb.forEach((entry, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row' + (i === highlightRank ? ' current' : '');

    const rank = document.createElement('span');
    rank.className = 'lb-rank';
    rank.textContent = `${i+1}.`;

    const init = document.createElement('span');
    init.className = 'lb-init';
    init.textContent = entry.initials;

    const score = document.createElement('span');
    score.className = 'lb-score';
    score.textContent = formatScore(entry.score);

    row.appendChild(rank);
    row.appendChild(init);
    row.appendChild(score);
    $leaderboard.appendChild(row);
  });
}

// ─── Init ─────────────────────────────────────────────────────────────────────
// invalidate cached letter size on resize
window.addEventListener('resize', () => {
  cachedLetterSize = null;
});

// sound toggle
document.getElementById('sound-checkbox').addEventListener('change', function() {
  state.soundEnabled = this.checked;
  const label = document.getElementById('sound-label');
  label.style.color = this.checked ? '#444' : '#333';
});

showStartScreen();
</script>
